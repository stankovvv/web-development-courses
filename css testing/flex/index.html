<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .flex-cont{
            display: flex;
        }
        .card{
            background-color: blue;
            border: 30px solid white;
            height: 100px;
            flex: 1;
        }
        .first{
            flex: 2;
        }
        .second{
            flex: 0.5;
        }

    </style>
</head>
<body>
    <div class="flex-cont">
        <div class="first card"></div>
        <div class="second card"></div>
        <div class="card"></div>
        <div class="card"></div>
    </div>
</body>
</html>
