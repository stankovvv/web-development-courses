<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex</title>
    <style>
        .flex-cont{
        display: flex;
        background-color: grey;
        }
        .header{
            display: flex;
            border: 30px solid white;
            height: 100px;
            flex: 1;
        }
        .content{
            display: flex;
            height: 700;
            flex: 3;
        }
        .footer{
            display: flex;
            height: 100px;
        }

    </style>
</head>
<body>
    <div class="flex-cont">
        <div class="header card"></div>
        <div class="sidebar"></div>
        <div class="content"></div>
        <div class="footer"></div>
    </div>
</body>
</html>
